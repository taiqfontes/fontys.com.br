<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Diagnóstico Financeiro — Fontys Inteligência Financeira</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B1F3A;--navy2:#071529;--slate:#3D4654;
  --gold:#B89B5E;--gold2:#D9C79A;--cream:#F6F4EF;
  --white:#FFFFFF;--line:rgba(11,31,58,0.11);
  --green:#4A7C59;--red:#A8453A;
  --vh:100vh;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;height:100%;}
body{
  background:var(--cream);color:var(--navy);font-family:'Inter',sans-serif;
  line-height:1.55;-webkit-font-smoothing:antialiased;
  min-height:100%;overscroll-behavior-y:none;
}
h1,h2,h3,h4{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.01em;}
.mono{font-family:'JetBrains Mono',monospace;}
button,input,textarea,select{font-size:16px;} /* evita zoom automático iOS */

.app{max-width:680px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* HEADER fixo compacto */
header{
  padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:sticky;top:0;background:var(--cream);z-index:10;
  border-bottom:1px solid transparent;transition:border-color .2s;
}
header.scrolled{border-bottom-color:var(--line);}
header img{height:30px;width:auto;}
.session-pill{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.06em;
  text-transform:uppercase;color:var(--navy);background:var(--white);
  border:1px solid var(--line);border-radius:100px;padding:5px 12px;
}

/* progresso geral discreto */
.global-prog{height:2px;background:var(--line);flex-shrink:0;}
.global-prog-fill{height:100%;background:var(--gold);transition:width .4s ease;}

/* progresso de sessão (mais visível, perto da pergunta) */
.session-prog-wrap{padding:14px 20px 0;flex-shrink:0;}
.session-prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.session-prog-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate);opacity:.7;}
.session-dots{display:flex;gap:5px;}
.session-dot{width:6px;height:6px;border-radius:50%;background:var(--line);transition:background .25s,transform .25s;}
.session-dot.done{background:var(--gold);}
.session-dot.current{background:var(--navy);transform:scale(1.3);}

/* MAIN */
main{padding:24px 20px 120px;}
.screen{display:none;}
.screen.active{display:block;animation:fadeIn .28s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* INTRO */
.intro{padding-top:4vh;}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:9px;margin-bottom:18px;}
.eyebrow::before{content:'';width:20px;height:1px;background:var(--gold);}
.intro h1{font-size:clamp(26px,6vw,36px);line-height:1.18;}
.intro p.lede{margin-top:14px;color:var(--slate);font-size:15.5px;}
.intro-time{
  margin-top:28px;display:inline-flex;align-items:center;gap:10px;
  background:var(--white);border:1px solid var(--line);border-radius:100px;
  padding:9px 16px 9px 12px;font-size:13.5px;color:var(--navy);font-weight:500;
}
.intro-time .dot-icon{width:7px;height:7px;border-radius:50%;background:var(--gold);}
.name-field{margin-top:32px;}
.name-field label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:8px;}
.name-field input{
  width:100%;padding:15px 16px;border:1.5px solid var(--line);border-radius:8px;
  background:var(--white);font-family:'Inter',sans-serif;color:var(--navy);
}
.name-field input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,155,94,.14);}
.intro-cta{margin-top:24px;display:flex;gap:10px;align-items:center;}
.intro-cta .btn-primary{flex:1;}
.privacy-note{margin-top:18px;font-size:12px;color:var(--slate);opacity:.75;line-height:1.5;}

/* SESSION INTRO */
.session-intro{padding-top:8vh;}
.session-intro .stag{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);letter-spacing:.05em;margin-bottom:10px;}
.session-intro h2{font-size:clamp(28px,7vw,38px);}
.session-intro p{margin-top:12px;color:var(--slate);font-size:15.5px;}

/* QUESTION */
.q-screen{padding-top:4px;}
.qtag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--slate);opacity:.6;}
.qtext{font-family:'Fraunces',serif;font-size:clamp(20px,5.2vw,25px);font-weight:500;color:var(--navy);margin-top:8px;line-height:1.32;}
.qhelp{margin-top:10px;font-size:13.5px;color:var(--slate);background:var(--white);border:1px solid var(--line);border-radius:8px;padding:12px 14px;}
.qhelp ul{margin:0;padding-left:18px;}
.qhelp li{margin-bottom:2px;}

.q-open textarea{
  margin-top:22px;width:100%;min-height:140px;border:1.5px solid var(--line);border-radius:8px;
  background:var(--white);padding:14px 15px;font-family:'Inter',sans-serif;font-size:16px;
  color:var(--navy);resize:vertical;line-height:1.55;
}
.q-open textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,155,94,.13);}
.q-open textarea::placeholder{color:#9aa3b0;}

.opts{margin-top:22px;display:flex;flex-direction:column;gap:10px;}
.opt{
  display:flex;align-items:center;gap:13px;padding:15px 16px;background:var(--white);
  border:1.5px solid var(--line);border-radius:10px;cursor:pointer;
  transition:border-color .15s,background .15s,transform .1s;
  font-size:15px;color:var(--navy);text-align:left;min-height:48px;
}
.opt:active{transform:scale(.985);}
.opt.sel{border-color:var(--gold);background:#FBF8F1;}
.opt-dot{width:19px;height:19px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;position:relative;transition:border-color .15s;}
.opt.sel .opt-dot{border-color:var(--gold);}
.opt.sel .opt-dot::after{content:'';position:absolute;top:50%;left:50%;width:8px;height:8px;border-radius:50%;background:var(--gold);transform:translate(-50%,-50%);}

/* MS escala (mesma estética dos opts) */
.scale-tema{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}

/* NAV BAR */
.nav-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(to top,var(--cream) 65%,transparent);
  padding:16px 0 calc(18px + env(safe-area-inset-bottom));
}
.nav-inner{max-width:680px;margin:0 auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.nav-save-row{text-align:center;padding:6px 0 2px;}
.nav-save-row button{background:none;border:none;color:var(--slate);font-size:12.5px;text-decoration:underline;cursor:pointer;padding:4px;font-family:'Inter',sans-serif;}
.save-toast{
  position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
  background:var(--navy,#0B1F3A);color:#fff;padding:12px 20px;border-radius:100px;font-size:13px;
  max-width:88%;text-align:center;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:200;
}
.save-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.resume-overlay{
  position:fixed;inset:0;background:rgba(11,31,58,.55);display:flex;align-items:center;justify-content:center;
  z-index:300;padding:20px;
}
.resume-card{background:#fff;border-radius:16px;padding:28px;max-width:360px;text-align:center;}
.resume-card h3{font-size:18px;margin-bottom:10px;}
.resume-card p{font-size:14px;color:var(--slate);margin-bottom:20px;line-height:1.5;}
.resume-card .rc-actions{display:flex;flex-direction:column;gap:10px;}
.btn{
  font-family:'Inter',sans-serif;font-size:15px;font-weight:600;padding:14px 24px;
  border-radius:100px;border:none;cursor:pointer;min-height:48px;
  transition:transform .12s,box-shadow .18s;
}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--navy);color:#fff;box-shadow:0 4px 14px rgba(11,31,58,.22);flex:1;}
.btn-primary:disabled{opacity:.32;cursor:not-allowed;box-shadow:none;}
.btn-back{background:var(--white);color:var(--slate);border:1.5px solid var(--line);width:48px;height:48px;padding:0;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;}
.btn-gold{background:var(--gold);color:#fff;box-shadow:0 4px 14px rgba(184,155,94,.32);}
.btn-ghost-pill{background:var(--white);color:var(--slate);border:1.5px solid var(--line);border-radius:100px;}

/* ======== RESULTADO ======== */
.result-wrap{padding-bottom:40px;}
.diag-central{padding:24px;background:var(--navy);border-radius:12px;color:#fff;}
.diag-central .dc-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold2);margin-bottom:10px;}
.diag-central p{font-family:'Fraunces',serif;font-size:clamp(16px,4.5vw,19px);font-style:italic;line-height:1.45;color:rgba(246,244,239,.92);}

.perfil-card{margin-top:16px;padding:22px;background:var(--white);border:1px solid var(--line);border-radius:12px;}
.perfil-card .dom-tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);}
.perfil-card h2{font-size:clamp(26px,7vw,34px);margin-top:6px;}
.perfil-card .crenca{font-style:italic;color:var(--slate);font-size:14px;margin-top:6px;}
.sec-badge{margin-top:12px;display:inline-flex;gap:6px;background:var(--cream);border:1px solid var(--line);border-radius:100px;padding:6px 13px;font-size:12.5px;}
.trait-row{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px;}
.trait{background:var(--cream);border-radius:8px;padding:14px;}
.trait .tl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;}
.trait.forte .tl{color:var(--green);}
.trait.risco .tl{color:var(--red);}
.trait p{font-size:13px;color:var(--slate);}
.combo-box{margin-top:12px;background:#FBF8F1;border:1px solid var(--gold2);border-radius:10px;padding:18px;}
.combo-box h4{font-size:12px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px;}
.combo-box p{font-size:13.5px;color:var(--slate);line-height:1.6;}

.score-section{margin-top:16px;background:var(--white);border:1px solid var(--line);border-radius:12px;padding:20px;}
.score-section h3{font-size:14px;margin-bottom:14px;}
.sbar-row{display:grid;grid-template-columns:96px 1fr 32px;align-items:center;gap:8px;margin-bottom:8px;}
.sbar-row .sname{font-size:11.5px;font-weight:500;}
.sbar-track{height:6px;background:var(--line);border-radius:4px;overflow:hidden;}
.sbar-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.sbar-row .sval{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--slate);text-align:right;}

.ms-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
.ms-card{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:18px;}
.ms-card .ms-tag{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--slate);opacity:.6;margin-bottom:6px;}
.ms-card .ms-score{font-family:'Fraunces',serif;font-size:30px;font-weight:600;line-height:1;}
.ms-card .ms-label{font-size:12px;font-weight:600;color:var(--gold);margin-top:3px;}
.ms-card .ms-desc{font-size:11.5px;color:var(--slate);margin-top:6px;line-height:1.45;}
.ms-bar{height:4px;background:var(--line);border-radius:4px;margin-top:10px;overflow:hidden;}
.ms-bar-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--gold));border-radius:4px;}

@media(min-width:480px){
  .trait-row{grid-template-columns:1fr 1fr;}
}

/* EXPORT */
.export-box{margin-top:16px;background:var(--white);border:1px solid var(--line);border-radius:10px;padding:18px;max-height:340px;overflow-y:auto;font-size:12px;color:var(--slate);white-space:pre-wrap;font-family:'JetBrains Mono',monospace;line-height:1.65;}
.act-row{margin-top:14px;display:flex;gap:9px;flex-wrap:wrap;}
.copy-fb{font-size:12px;color:var(--gold);margin-top:8px;opacity:0;transition:opacity .3s;font-family:'JetBrains Mono',monospace;}
.copy-fb.show{opacity:1;}

:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto;}.screen.active{animation:none;}}

/* ======== IMPRESSÃO ======== */
#printArea{display:none;}
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{
    display:block;position:absolute;top:0;left:0;width:100%;
    background:#fff;color:#0B1F3A;font-family:'Inter',sans-serif;padding:0;
  }
  .print-header{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #0B1F3A;padding-bottom:14px;margin-bottom:24px;}
  .print-header img{height:36px;}
  .print-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:#3D4654;}
  .print-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#B89B5E;margin-bottom:6px;}
  .print-title h1{font-family:'Fraunces',serif;font-size:30px;color:#0B1F3A;margin-bottom:18px;}
  .print-sec{font-size:18px;color:#3D4654;font-weight:400;}
  .print-diag{background:#F6F4EF;border-left:4px solid #B89B5E;padding:16px 18px;margin-bottom:18px;border-radius:4px;}
  .print-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#B89B5E;margin-bottom:6px;}
  .print-diag p{font-style:italic;font-size:14px;line-height:1.5;color:#0B1F3A;}
  .print-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
  .print-box{background:#F6F4EF;border:1px solid #ddd;border-radius:6px;padding:14px 16px;}
  .print-box p{font-size:12.5px;color:#3D4654;line-height:1.5;}
  .print-combo{background:#FBF8F1;border:1px solid #D9C79A;border-radius:6px;padding:14px 16px;margin-bottom:16px;}
  .print-combo p{font-size:12.5px;color:#3D4654;line-height:1.5;margin-top:4px;}
  .print-ms{margin-top:20px;}
  .print-score{font-family:'Fraunces',serif;font-size:32px;font-weight:600;color:#0B1F3A;line-height:1;}
  .print-score span{font-size:14px;color:#3D4654;font-weight:400;}
  .print-score-label{font-size:12px;font-weight:600;color:#B89B5E;margin:2px 0 8px;}
  .print-footer{margin-top:30px;padding-top:14px;border-top:1px solid #ddd;font-family:'JetBrains Mono',monospace;font-size:10px;color:#888;text-align:center;}
  @page{margin:18mm;}
}
</style>
</head>

<div class="app">

  <header id="appHeader">
    <img id="logoImg" alt="Fontys Inteligência Financeira">
    <div class="session-pill mono" id="sessionPill">Início</div>
  </header>
  <div class="global-prog"><div class="global-prog-fill" id="globalProgFill" style="width:0%"></div></div>

  <div class="session-prog-wrap" id="sessionProgWrap" style="display:none;">
    <div class="session-prog-row">
      <span class="session-prog-label mono" id="sessionProgLabel"></span>
      <div class="session-dots" id="sessionDots"></div>
    </div>
  </div>

  <main id="mainContent"></main>

  <div class="nav-bar" id="navBar">
    <div class="nav-save-row"><button id="btnSaveExit">💾 Salvar e continuar depois</button></div>
    <div class="nav-inner">
      <button class="btn-back" id="btnBack" aria-label="Voltar">←</button>
      <button class="btn btn-primary" id="btnNext">Continuar</button>
    </div>
  </div>
  <div class="save-toast" id="saveToast">Progresso salvo. Você pode voltar a este link quando quiser.</div>

</div>

function getDiagnosticoCentral(arquetipo, maturidade, saude) {
  let sit;
  if (maturidade <= 40) sit = "A";
  else if (saude <= 40) sit = "B";
  else if (maturidade <= 60 && saude <= 60) sit = "C";
  else sit = "D";
  return DIAGNOSTICO_CENTRAL[arquetipo + "-" + sit] || "";
}

function getMaturidadeLabel(score) {
  if (score <= 20) return {label:"Caótico", desc:"Sem estrutura financeira. Ponto de partida do processo."};
  if (score <= 40) return {label:"Reativo", desc:"Existe alguma consciência, mas a gestão é emergencial."};
  if (score <= 60) return {label:"Organizado", desc:"Há controle básico, mas falta consistência e estratégia."};
  if (score <= 80) return {label:"Estruturado", desc:"Boa base construída. Próximo passo: otimização e crescimento."};
  return {label:"Patrimonial", desc:"Alta maturidade. Foco em multiplicação e legado."};
}

  { tema:"Dependência de crédito", q:"Com que frequência usa crédito para fechar o mês?", opcoes:[
    {t:"Frequentemente — é parte da minha rotina", v:0},
    {t:"Às vezes, quando aperta", v:3},
    {t:"Raramente", v:7},
    {t:"Nunca uso crédito para fechar o mês", v:10}
  ]},
  { tema:"Fluxo de caixa", q:"Você sabe exatamente quanto entra e sai na sua vida financeira?", opcoes:[
    {t:"Não faço ideia", v:0},
    {t:"Tenho uma ideia aproximada", v:3},
    {t:"Sei razoavelmente bem", v:7},
    {t:"Sei com precisão, acompanho regularmente", v:10}
  ]}
];

function getSaudeLabel(score) {
  if (score <= 20) return {label:"Crítica", desc:"Situação de alto risco. Intervenção urgente necessária."};
  if (score <= 40) return {label:"Frágil", desc:"Base instável. Alta vulnerabilidade a imprevistos."};
  if (score <= 60) return {label:"Estável", desc:"Situação controlada, mas sem margem de segurança."};
  if (score <= 80) return {label:"Saudável", desc:"Boa situação. Foco em crescimento e proteção."};
  return {label:"Excelente", desc:"Finanças sólidas. Prioridade: otimização e legado."};
}

</script>
<script>
// ============================================================
// APP ENGINE — v4 mobile-first
// ============================================================
document.getElementById('logoImg').src = LOGO_B64;

let state = {
  si: 0,
  nome: '',
  resAbertas: {},
  resFechadas: {},
  resMaturidade: {},
  resSaude: {},
  scores: {},
  maturidade: {},
  saude: {},
  _enviado: false
};

function enviarDiagnostico(perfilDominante, maturidade, saude) {
  if (state._enviado) return;
  state._enviado = true;
  clearLocal();
  fetch('/api/diagnostico', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      nome: state.nome,
      perfilDominante,
      maturidade,
      saude,
      respostas: {
        resAbertas: state.resAbertas,
        resFechadas: state.resFechadas,
        resMaturidade: state.resMaturidade,
        resSaude: state.resSaude,
        scores: state.scores
      }
    })
  }).catch(err => console.error('Falha ao enviar diagnóstico:', err));
}

let SCREENS = [];
function buildScreens() {
  SCREENS = [{type:'intro'}];
  SCREENS.push({type:'session-intro-b'});
  MATURIDADE_PERGUNTAS.forEach((item,i) => SCREENS.push({type:'maturidade', index:i, item}));
  SCREENS.push({type:'session-intro-c'});
  SAUDE_PERGUNTAS.forEach((item,i) => SCREENS.push({type:'saude', index:i, item}));
  SESSOES.forEach(s => {
    SCREENS.push({type:'session-intro', sessao:s});
    PERGUNTAS[s].abertas.forEach((item,i) => SCREENS.push({type:'aberta', sessao:s, index:i, item}));
    PERGUNTAS[s].fechadas.forEach((item,i) => SCREENS.push({type:'fechada', sessao:s, index:i, item}));
  });
  SCREENS.push({type:'resultado'});
  SCREENS.push({type:'export'});
}
buildScreens();

const mc = document.getElementById('mainContent');
const btnBack = document.getElementById('btnBack');
const btnNext = document.getElementById('btnNext');
const navBar = document.getElementById('navBar');
const sessionPill = document.getElementById('sessionPill');
const globalProgFill = document.getElementById('globalProgFill');
const sessionProgWrap = document.getElementById('sessionProgWrap');
const sessionProgLabel = document.getElementById('sessionProgLabel');
const sessionDots = document.getElementById('sessionDots');
const appHeader = document.getElementById('appHeader');

const isQ = s => ['aberta','fechada','maturidade','saude'].includes(s.type);
const totalQ = () => SCREENS.filter(isQ).length;
const posQ = idx => { let p=0; for(let i=0;i<idx;i++) if(isQ(SCREENS[i])) p++; return p; };

// sessões nomeadas para exibição (inclui maturidade/saude como pseudo-sessões)
function sessaoAtualInfo(sc) {
  if (sc.sessao) {
    const idx = SESSOES.indexOf(sc.sessao);
    const itensSessao = PERGUNTAS[sc.sessao].abertas.length + PERGUNTAS[sc.sessao].fechadas.length;
    let posNaSessao;
    if (sc.type === 'aberta') posNaSessao = sc.index;
    else posNaSessao = PERGUNTAS[sc.sessao].abertas.length + sc.index;
    return { nome: NOME_SESSAO[sc.sessao], num: idx+3, totalSessoes: 6, pos: posNaSessao, total: itensSessao };
  }
  if (sc.type === 'maturidade') return { nome:'Maturidade Financeira', num:1, totalSessoes:6, pos:sc.index, total:MATURIDADE_PERGUNTAS.length };
  if (sc.type === 'saude') return { nome:'Saúde Financeira', num:2, totalSessoes:6, pos:sc.index, total:SAUDE_PERGUNTAS.length };
  return null;
}

window.addEventListener('scroll', () => {
  appHeader.classList.toggle('scrolled', window.scrollY > 4);
});

function render() {
  const sc = SCREENS[state.si];
  mc.innerHTML = '';

  const special = ['intro','resultado','export'].includes(sc.type);
  const isSessionIntro = sc.type.startsWith('session-intro');

  globalProgFill.parentElement.style.display = special ? 'none' : 'block';
  if (!special) globalProgFill.style.width = Math.round(posQ(state.si)/totalQ()*100) + '%';

  if (isSessionIntro || special) {
    sessionProgWrap.style.display = 'none';
  } else {
    sessionProgWrap.style.display = 'block';
    const info = sessaoAtualInfo(sc);
    sessionProgLabel.textContent = `${info.nome} · ${info.pos+1} de ${info.total}`;
    sessionDots.innerHTML = '';
    for (let i=0;i<info.total;i++) {
      const d = document.createElement('div');
      d.className = 'session-dot' + (i<info.pos?' done':i===info.pos?' current':'');
      sessionDots.appendChild(d);
    }
  }

  if (sc.type==='intro') sessionPill.textContent = 'Início';
  else if (sc.type==='resultado'||sc.type==='export') sessionPill.textContent = 'Resultado';
  else {
    const info = sessaoAtualInfo(sc);
    sessionPill.textContent = info ? `${info.num}/6` : '';
  }

  if (sc.type==='intro') rIntro();
  else if (sc.type==='session-intro') rSessionIntro(sc);
  else if (sc.type==='session-intro-b') rSessionIntroGeneric('Maturidade Financeira','Agora vamos entender o que você já tem estruturado hoje. Sem julgamentos — apenas diagnóstico.');
  else if (sc.type==='session-intro-c') rSessionIntroGeneric('Saúde Financeira','Por último, avalie com honestidade como está sua situação financeira neste momento.');
  else if (sc.type==='aberta') rAberta(sc);
  else if (sc.type==='fechada') rFechada(sc);
  else if (sc.type==='maturidade') rMaturidade(sc);
  else if (sc.type==='saude') rSaude(sc);
  else if (sc.type==='resultado') rResultado();
  else if (sc.type==='export') rExport();

  updateNav();
  window.scrollTo(0,0);
  saveLocal();
}

function rIntro() {
  mc.innerHTML = `<div class="screen active intro">
    <div class="eyebrow">Fontys · Inteligência Financeira</div>
    <h1>Vamos entender sua relação com o dinheiro.</h1>
    <p class="lede">Algumas perguntas sobre como você pensa, decide e organiza sua vida financeira.</p>
    <div class="intro-time"><span class="dot-icon"></span>Leva cerca de 30 minutos</div>
    <div class="name-field">
      <label>Como você se chama?</label>
      <input type="text" id="nomeInput" placeholder="Seu nome" value="${state.nome}">
    </div>
    <div class="intro-cta">
      <button class="btn btn-primary" id="btnStartInline" disabled>Começar</button>
    </div>
    <p class="privacy-note">Suas respostas serão usadas pela Fontys para gerar seu diagnóstico financeiro personalizado e para contato sobre os resultados.</p>
  </div>`;
  const nomeInput = document.getElementById('nomeInput');
  const btnStart = document.getElementById('btnStartInline');
  function syncBtn(){ btnStart.disabled = nomeInput.value.trim().length===0; }
  nomeInput.addEventListener('input', e => { state.nome = e.target.value; syncBtn(); });
  btnStart.addEventListener('click', goNext);
  syncBtn();
}

function rSessionIntro(sc) {
  const idx = SESSOES.indexOf(sc.sessao);
  const showBack = state.si>0;
  mc.innerHTML = `<div class="screen active session-intro">
    <div class="stag mono">Sessão ${idx+3} de 6</div>
    <h2>${NOME_SESSAO[sc.sessao]}</h2>
    <p>${DESC_SESSAO[sc.sessao]}</p>
    <div class="intro-cta">
      ${showBack?'<button class="btn-back" id="btnBackInline" aria-label="Voltar">←</button>':''}
      <button class="btn btn-primary" id="btnSessionStart">Iniciar</button>
    </div>
  </div>`;
  document.getElementById('btnSessionStart').addEventListener('click', goNext);
  if(showBack) document.getElementById('btnBackInline').addEventListener('click', goBack);
}
function rSessionIntroGeneric(titulo, desc) {
  const showBack = state.si>0;
  mc.innerHTML = `<div class="screen active session-intro">
    <div class="stag mono" id="sessGenTag"></div>
    <h2>${titulo}</h2>
    <p>${desc}</p>
    <div class="intro-cta">
      ${showBack?'<button class="btn-back" id="btnBackInline2" aria-label="Voltar">←</button>':''}
      <button class="btn btn-primary" id="btnSessionStart2">Iniciar</button>
    </div>
  </div>`;
  document.getElementById('sessGenTag').textContent = titulo.includes('Maturidade') ? 'Sessão 1 de 6' : 'Sessão 2 de 6';
  document.getElementById('btnSessionStart2').addEventListener('click', goNext);
  if(showBack) document.getElementById('btnBackInline2').addEventListener('click', goBack);
}

function rAberta(sc) {
  const key = sc.sessao+'-'+sc.index;
  const val = state.resAbertas[key]||'';
  const ajuda = sc.item.ajuda ? `<div class="qhelp">${sc.item.ajuda}</div>` : '';
  mc.innerHTML = `<div class="screen active q-screen">
    <div class="qtag mono">Pergunta aberta</div>
    <div class="qtext">${sc.item.texto}</div>
    ${ajuda}
    <div class="q-open"><textarea id="oInput" placeholder="Escreva livremente...">${val}</textarea></div>
  </div>`;
  document.getElementById('oInput').addEventListener('input', e => { state.resAbertas[key]=e.target.value; });
}

function rFechada(sc) {
  const key = sc.sessao+'-'+sc.index;
  const sel = state.resFechadas[key];
  mc.innerHTML = `<div class="screen active q-screen">
    <div class="qtag mono">Escolha uma opção</div>
    <div class="qtext">${sc.item.q}</div>
    <div class="opts">${sc.item.opcoes.map((o,i)=>`
      <div class="opt${sel===i?' sel':''}" data-idx="${i}">
        <div class="opt-dot"></div><div>${o.t}</div>
      </div>`).join('')}</div>
  </div>`;
  mc.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>{ state.resFechadas[key]=parseInt(el.dataset.idx); setTimeout(goNext,200); });
  });
}

function rMaturidade(sc) {
  const val = state.resMaturidade[sc.index];
  mc.innerHTML = `<div class="screen active q-screen">
    <div class="qtag mono">Maturidade Financeira</div>
    <div class="qtext">${sc.item.tema}</div>
    <div class="opts">${sc.item.opcoes.map((o,i)=>`
      <div class="opt${val===i?' sel':''}" data-idx="${i}">
        <div class="opt-dot"></div><div>${o.t}</div>
      </div>`).join('')}</div>
  </div>`;
  mc.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>{ state.resMaturidade[sc.index]=parseInt(el.dataset.idx); setTimeout(goNext,200); });
  });
}

function rSaude(sc) {
  const val = state.resSaude[sc.index];
  mc.innerHTML = `<div class="screen active q-screen">
    <div class="qtag mono">Saúde Financeira</div>
    <div class="qtext">${sc.item.q||sc.item.tema}</div>
    <div class="opts">${sc.item.opcoes.map((o,i)=>`
      <div class="opt${val===i?' sel':''}" data-idx="${i}">
        <div class="opt-dot"></div><div>${o.t}</div>
      </div>`).join('')}</div>
  </div>`;
  mc.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>{ state.resSaude[sc.index]=parseInt(el.dataset.idx); setTimeout(goNext,200); });
  });
}

// ============================================================
// CÁLCULOS
// ============================================================
function calcScores() {
  const oport = {}; Object.keys(PERFIS).forEach(p=>oport[p]=0);
  SESSOES.forEach(s=>PERGUNTAS[s].fechadas.forEach(f=>f.opcoes.forEach(o=>oport[o.p]++)));
  const raw = {}; Object.keys(PERFIS).forEach(p=>raw[p]=0);
  SESSOES.forEach(s=>{
    PERGUNTAS[s].fechadas.forEach((item,i)=>{
      const sel = state.resFechadas[s+'-'+i];
      if(sel!==undefined) raw[item.opcoes[sel].p]++;
    });
  });
  const norm = {};
  Object.keys(PERFIS).forEach(p=>{ norm[p] = oport[p]>0 ? Math.round(raw[p]/oport[p]*100) : 0; });
  return norm;
}
function calcMaturidade() {
  let soma=0;
  MATURIDADE_PERGUNTAS.forEach((p,i)=>{ const sel=state.resMaturidade[i]; soma += sel!==undefined?p.opcoes[sel].v:0; });
  const score = Math.round(soma/60*100);
  return {score, ...getMaturidadeLabel(score)};
}
function calcSaude() {
  let soma=0;
  SAUDE_PERGUNTAS.forEach((p,i)=>{ const sel=state.resSaude[i]; soma += sel!==undefined?p.opcoes[sel].v:0; });
  const score = Math.round(soma/70*100);
  return {score, ...getSaudeLabel(score)};
}

// ============================================================
// RESULTADO
// ============================================================
function rResultado() {
  const scores = calcScores();
  const mat = calcMaturidade();
  const sau = calcSaude();
  state.scores=scores; state.maturidade=mat; state.saude=sau;

  const ordered = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const [domKey,domScore] = ordered[0];
  const [secKey,secScore] = ordered[1];
  const isDifuso = domScore < 35;
  const dom = PERFIS[domKey], sec = PERFIS[secKey];
  const combo = getCombinacao(domKey, secKey);

  enviarDiagnostico(domKey, mat, sau);
  const diagCentral = getDiagnosticoCentral(domKey, mat.score, sau.score);

  const CORES = {guardiao:'#0B1F3A',hedonista:'#B89B5E',estrategista:'#3D4654',conquistador:'#4A7C59',sobrevivente:'#A8453A',cuidador:'#7B5EA7',explorador:'#2980B9',desconectado:'#8e9aaf'};
  const barsHtml = ordered.map(([k,v])=>`
    <div class="sbar-row">
      <div class="sname">${PERFIS[k].nome}</div>
      <div class="sbar-track"><div class="sbar-fill" style="width:${v}%;background:${CORES[k]}"></div></div>
      <div class="sval">${v}%</div>
    </div>`).join('');

  const saudacao = state.nome ? `${state.nome}, ` : '';

  mc.innerHTML = `<div class="screen active result-wrap">
    <div class="eyebrow">Seu diagnóstico</div>
    <div class="diag-central">
      <div class="dc-label mono">Diagnóstico Central</div>
      <p>${saudacao}${diagCentral.charAt(0).toLowerCase()+diagCentral.slice(1)}</p>
    </div>
    <div class="perfil-card">
      <div class="dom-tag mono">Perfil dominante${isDifuso?' · Perfil Difuso':''}</div>
      <h2>${isDifuso?'Perfil Difuso':dom.nome}</h2>
      ${isDifuso
        ? '<p style="color:var(--slate);margin-top:8px;font-size:14px;">Seu comportamento financeiro é distribuído entre múltiplos perfis — isso indica versatilidade, mas pode dificultar padrões de gestão consistentes.</p>'
        : `<div class="crenca">"${dom.crenca}"</div>
           <div class="sec-badge">Secundário: <strong>${sec.nome}</strong></div>
           <div class="trait-row">
             <div class="trait forte"><div class="tl mono">Ponto forte</div><p>${dom.forte}</p></div>
             <div class="trait risco"><div class="tl mono">Atenção</div><p>${dom.risco}</p></div>
           </div>
           ${combo?`<div class="combo-box"><h4>${dom.nome} + ${sec.nome}</h4><p>${combo}</p></div>`:''}`
      }
    </div>
    <div class="score-section"><h3>Distribuição entre os 8 perfis</h3>${barsHtml}</div>
    <div class="ms-grid">
      <div class="ms-card">
        <div class="ms-tag mono">Maturidade</div>
        <div class="ms-score">${mat.score}</div>
        <div class="ms-label">${mat.label}</div>
        <div class="ms-desc">${mat.desc}</div>
        <div class="ms-bar"><div class="ms-bar-fill" style="width:${mat.score}%"></div></div>
      </div>
      <div class="ms-card">
        <div class="ms-tag mono">Saúde Financeira</div>
        <div class="ms-score">${sau.score}</div>
        <div class="ms-label">${sau.label}</div>
        <div class="ms-desc">${sau.desc}</div>
        <div class="ms-bar"><div class="ms-bar-fill" style="width:${sau.score}%"></div></div>
      </div>
    </div>
  </div>`;
}

// ============================================================
// EXPORT
// ============================================================
function montarTextoResumo() {
  const scores=state.scores, mat=state.maturidade, sau=state.saude;
  const ordered=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const dom=PERFIS[ordered[0][0]], sec=PERFIS[ordered[1][0]];

  let txt = 'DIAGNÓSTICO FINANCEIRO — FONTYS INTELIGÊNCIA FINANCEIRA\n';
  txt += '═'.repeat(50) + '\n';
  if(state.nome) txt += `Nome: ${state.nome}\n`;
  txt += '\n';
  txt += `PERFIL DOMINANTE: ${dom.nome}\n`;
  txt += `PERFIL SECUNDÁRIO: ${sec.nome}\n`;
  txt += `MATURIDADE FINANCEIRA: ${mat.score}/100 — ${mat.label}\n`;
  txt += `SAÚDE FINANCEIRA: ${sau.score}/100 — ${sau.label}\n\n`;
  txt += 'PONTUAÇÃO POR PERFIL:\n';
  ordered.forEach(([k,v])=>{ txt += `  ${PERFIS[k].nome}: ${v}%\n`; });
  txt += '\n' + '─'.repeat(40) + '\nRESPOSTAS ABERTAS:\n\n';
  SESSOES.forEach(s=>{
    txt += `[ ${NOME_SESSAO[s].toUpperCase()} ]\n`;
    PERGUNTAS[s].abertas.forEach((item,i)=>{
      const r = state.resAbertas[s+'-'+i]||'(não respondido)';
      txt += `P: ${item.texto}\nR: ${r}\n\n`;
    });
  });
  return txt;
}

function rExport() {
  const txt = montarTextoResumo();
  mc.innerHTML = `<div class="screen active">
    <div class="eyebrow">Resumo para envio</div>
    <h2 style="font-size:24px;margin-top:4px;">Pronto para enviar</h2>
    <p style="color:var(--slate);margin-top:8px;font-size:14.5px;">Copie, compartilhe ou imprima o resumo com seu consultor.</p>
    <div class="export-box" id="expBox">${txt}</div>
    <div class="act-row">
      <button class="btn btn-gold" id="btnShare">Compartilhar resultado</button>
      <button class="btn btn-ghost-pill" id="btnCopy">Copiar</button>
    </div>
    <div class="act-row">
      <button class="btn btn-ghost-pill" id="btnPrint">🖨 Imprimir resultado</button>
    </div>
    <div class="act-row">
      <button class="btn btn-ghost-pill" id="btnRestart">Refazer diagnóstico</button>
    </div>
    <div class="copy-fb mono" id="copyFb">Copiado ✓</div>
  </div>`;

  document.getElementById('btnCopy').addEventListener('click', ()=>{
    navigator.clipboard.writeText(txt).then(()=>{
      const fb=document.getElementById('copyFb');
      fb.classList.add('show'); setTimeout(()=>fb.classList.remove('show'),2500);
    });
  });

  document.getElementById('btnShare').addEventListener('click', async ()=>{
    if (navigator.share) {
      try { await navigator.share({ title:'Diagnóstico Financeiro Fontys', text:txt }); }
      catch(e){ /* usuário cancelou */ }
    } else {
      navigator.clipboard.writeText(txt).then(()=>{
        const fb=document.getElementById('copyFb');
        fb.classList.add('show'); setTimeout(()=>fb.classList.remove('show'),2500);
      });
    }
  });

  document.getElementById('btnPrint').addEventListener('click', imprimirResultado);

  document.getElementById('btnRestart').addEventListener('click', ()=>{
    if(confirm('Isso vai limpar todas as respostas. Continuar?')){
      clearLocal();
      state = {si:0,nome:'',resAbertas:{},resFechadas:{},resMaturidade:{},resSaude:{},scores:{},maturidade:{},saude:{},_enviado:false};
      render();
    }
  });
}

// ============================================================
// IMPRESSÃO
// ============================================================
function imprimirResultado() {
  const scores = state.scores, mat = state.maturidade, sau = state.saude;
  const ordered = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const [domKey,domScore] = ordered[0];
  const [secKey] = ordered[1];
  const isDifuso = domScore < 35;
  const dom = PERFIS[domKey], sec = PERFIS[secKey];
  const combo = getCombinacao(domKey, secKey);
  const diagCentral = getDiagnosticoCentral(domKey, mat.score, sau.score);
  const dataHoje = new Date().toLocaleDateString('pt-BR');

  let printArea = document.getElementById('printArea');
  if (!printArea) {
    printArea = document.createElement('div');
    printArea.id = 'printArea';
    document.body.appendChild(printArea);
  }

  printArea.innerHTML = `
    <div class="print-header">
      <img src="${LOGO_B64}" alt="Fontys">
      <div class="print-date">${dataHoje}</div>
    </div>
    <div class="print-title">
      <div class="print-eyebrow">Diagnóstico Financeiro${state.nome?' — '+state.nome:''}</div>
      <h1>${isDifuso?'Perfil Difuso':dom.nome}${!isDifuso?` <span class="print-sec">+ ${sec.nome}</span>`:''}</h1>
    </div>
    <div class="print-diag">
      <div class="print-label">Diagnóstico Central</div>
      <p>${diagCentral}</p>
    </div>
    ${!isDifuso ? `
    <div class="print-grid">
      <div class="print-box">
        <div class="print-label">Ponto forte</div>
        <p>${dom.forte}</p>
      </div>
      <div class="print-box">
        <div class="print-label">Ponto de atenção</div>
        <p>${dom.risco}</p>
      </div>
    </div>
    ${combo?`<div class="print-combo"><div class="print-label">${dom.nome} + ${sec.nome}</div><p>${combo}</p></div>`:''}
    ` : `<p style="font-size:13px;color:#3D4654;margin-top:10px;">Comportamento financeiro distribuído entre múltiplos perfis — indica versatilidade, mas pode dificultar padrões de gestão consistentes.</p>`}

    <div class="print-grid print-ms">
      <div class="print-box">
        <div class="print-label">Maturidade Financeira</div>
        <div class="print-score">${mat.score}<span>/100</span></div>
        <div class="print-score-label">${mat.label}</div>
        <p>${mat.desc}</p>
      </div>
      <div class="print-box">
        <div class="print-label">Saúde Financeira</div>
        <div class="print-score">${sau.score}<span>/100</span></div>
        <div class="print-score-label">${sau.label}</div>
        <p>${sau.desc}</p>
      </div>
    </div>

    <div class="print-footer">Fontys — Inteligência Financeira · Diagnóstico gerado em ${dataHoje}</div>
  `;

  window.print();
}


function isAnswered() {
  const sc = SCREENS[state.si];
  if (sc.type==='intro') return state.nome.trim().length>0;
  if (sc.type==='fechada') return state.resFechadas[sc.sessao+'-'+sc.index]!==undefined;
  if (sc.type==='maturidade') return state.resMaturidade[sc.index]!==undefined;
  if (sc.type==='saude') return state.resSaude[sc.index]!==undefined;
  return true;
}
function updateNav() {
  const sc = SCREENS[state.si];
  if (sc.type==='export' || sc.type==='intro' || sc.type==='session-intro' || sc.type==='session-intro-b' || sc.type==='session-intro-c'){ navBar.style.display='none'; return; }
  navBar.style.display='block';
  btnBack.style.visibility = state.si===0?'hidden':'visible';
  const isAuto = ['fechada','maturidade','saude'].includes(sc.type);
  btnNext.style.display = isAuto?'none':'block';
  btnNext.disabled = !isAnswered();
  const labels = {intro:'Começar',resultado:'Ver resumo completo','session-intro':'Iniciar','session-intro-b':'Iniciar','session-intro-c':'Iniciar'};
  btnNext.textContent = labels[sc.type] || 'Continuar';
}
function goNext(){ if(state.si<SCREENS.length-1){state.si++;render();} }
function goBack(){ if(state.si>0){state.si--;render();} }
btnNext.addEventListener('click',goNext);
btnBack.addEventListener('click',goBack);

// ---- Salvar / retomar progresso (localStorage, mesmo dispositivo) ----
const LS_KEY = 'fontys_diagnostico_progress_v1';

function saveLocal() {
  try {
    if (state.si > 0 && state.si < SCREENS.length - 1) {
      localStorage.setItem(LS_KEY, JSON.stringify(state));
    }
  } catch (e) { /* localStorage indisponível, ignora silenciosamente */ }
}

function clearLocal() {
  try { localStorage.removeItem(LS_KEY); } catch (e) {}
}

function showSaveToast() {
  const t = document.getElementById('saveToast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('btnSaveExit').addEventListener('click', () => {
  saveLocal();
  showSaveToast();
});

function tentarRetomar() {
  let saved = null;
  try { saved = localStorage.getItem(LS_KEY); } catch (e) {}
  if (!saved) { render(); return; }
  let parsed;
  try { parsed = JSON.parse(saved); } catch (e) { clearLocal(); render(); return; }
  if (!parsed || typeof parsed.si !== 'number') { clearLocal(); render(); return; }

  const overlay = document.createElement('div');
  overlay.className = 'resume-overlay';
  overlay.innerHTML = `
    <div class="resume-card">
      <h3>Continuar de onde parou?</h3>
      <p>Encontramos um diagnóstico em andamento${parsed.nome ? ' de <b>'+parsed.nome+'</b>' : ''}. Quer continuar, ou começar um novo?</p>
      <div class="rc-actions">
        <button class="btn btn-primary" id="rcContinuar">Continuar diagnóstico</button>
        <button class="btn btn-ghost-pill" id="rcNovo">Começar do zero</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('rcContinuar').addEventListener('click', () => {
    state = Object.assign(state, parsed);
    overlay.remove();
    render();
  });
  document.getElementById('rcNovo').addEventListener('click', () => {
    clearLocal();
    overlay.remove();
    render();
  });
}

tentarRetomar();
</script>
</body>
</html>
